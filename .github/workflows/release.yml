name: Publish reference implementations

# Publishes the three reference implementations (impl/) to their registries when
# a version tag is pushed (e.g. v1.5.0), or manually via the Actions tab.
#
# Required setup (one-time):
#   - PyPI: configure Trusted Publishing for project "pairl" pointing at this
#     repo + workflow "release.yml" + environment "pypi" (no token needed).
#   - npm:  repository secret NPM_TOKEN (an automation token with publish rights).
#   - crates.io: repository secret CARGO_REGISTRY_TOKEN.
# Each job is independent — a missing secret only skips that one registry.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  versions:
    name: Tag matches package versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check tag == the three package versions
        run: |
          # On a tag push, require all three packages to match the tag (v1.5.1 -> 1.5.1).
          # On manual dispatch (no tag) just require the three to agree.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            scripts/check_versions.sh "${GITHUB_REF_NAME#v}"
          else
            scripts/check_versions.sh
          fi

  python:
    name: Publish Python → PyPI
    needs: versions
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        working-directory: impl/python
        run: pipx run build --outdir dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: impl/python/dist

  npm:
    name: Publish TypeScript → npm
    needs: versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install + build + test
        working-directory: impl/typescript
        run: |
          npm ci
          npm run build
          npm test
      - name: Publish to npm
        working-directory: impl/typescript
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  crates:
    name: Publish Rust → crates.io
    needs: versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        working-directory: impl/rust
        run: cargo test
      - name: Publish to crates.io
        working-directory: impl/rust
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
